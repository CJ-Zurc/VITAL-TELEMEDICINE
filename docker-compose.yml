services:
  vital-telemedicine-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8010}:${PORT:-8010}"
    environment:
      PORT: ${PORT:-8010}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-BGH_LOCAL_INTERNAL_API_KEY_2026}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const port=process.env.PORT||8010;const req=http.get({host:'127.0.0.1',port,path:'/'},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
